server.port=8082

# Configuración de subida de archivos
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Rutas de almacenamiento de imágenes
upload.path=uploads/categorias
upload.path.eventos=uploads/eventos

# Conexión a la base de datos
spring.datasource.url=jdbc:mysql://localhost:3306/eventhive
spring.datasource.username=root
spring.datasource.password=12345
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración de JPA/Hibernate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# para crear la bd cambiar update por create, luego volver a update
spring.jpa.hibernate.ddl-auto=update

# Mantener camelCase en la base de datos
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl
spring.jpa.open-in-view=false