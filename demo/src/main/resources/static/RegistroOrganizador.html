<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Eventos Cartagena</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <!-- Header -->
    <header class="login-header">
        <div class="container header-inner">
            <a href="/" class="navbar-brand">EventHive</a>
        </div>
    </header>
    
    <!-- Main Content -->
    <main class="main-content">
        <div class="auth-container">
            <div class="auth-box">
                <div class="auth-card-top">
                    <p class="auth-subtitle">Únete a EventHive como organizador</p>
                    <h2 class="auth-card-title">Crear mi cuenta</h2>
                </div>
                <form id="signinForm" class="auth-form">
                    <div class="form-grid">
                        <div class="input-group">
                            <label for="nombre">Nombre</label>
                            <input type="text" id="nombre" placeholder="Tu nombre" required>
                        </div>
                        <div class="input-group">
                            <label for="apellido">Apellido</label>
                            <input type="text" id="apellido" placeholder="Tu apellido" required>
                        </div>
                    </div>
                    <div class="input-group">
                        <label for="email">Correo Electrónico</label>
                        <input type="email" id="email" placeholder="tucorreo@ejemplo.com" required>
                    </div>
                    <div class="input-group">
                        <label for="telefono">Teléfono</label>
                        <input type="text" id="telefono" placeholder="Tu número de teléfono" required>
                    </div>
                    <div class="input-group">
                        <label for="password">Contraseña</label>
                        <div class="password-input-group">
                            <input type="password" id="password" placeholder="●●●●●●●●" required>
                            <button type="button" class="toggle-password" aria-label="Toggle password visibility">
                                <i class="far fa-eye"></i>
                            </button>
                        </div>
                    </div>
                    <button type="submit" class="btn-auth btn-primary">Registrarse</button>
                    <p class="auth-switch">¿Ya tienes cuenta? <a href="/login">Inicia sesión</a></p>
                </form>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="main-footer">
        <div th:replace="~{fragments/footer :: footer}"></div>
    </footer>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/RespuestaCrearOrganizador.js"></script>
</body>
</html>
