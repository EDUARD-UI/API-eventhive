<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contáctanos | EventHive</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Open+Sans:wght@400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>

<body>
    <header class="main-header">
        <div th:replace="~{fragments/navbar :: navbar}"></div>
    </header>

    <main class="container" style="padding:3rem 0;">
        <section class="contact-section">
            <h1 class="section-title">Contáctanos</h1>
            <div class="contact-grid">
                <div class="contact-card">
                    <h3>Escríbenos</h3>
                    <p class="muted">¿Tienes preguntas, sugerencias o necesitas ayuda? Completa el formulario y te
                        responderemos pronto.</p>
                    <form class="contact-form" action="#" method="post">
                        <div class="input-group">
                            <label for="name">Nombre</label>
                            <input id="name" name="name" type="text" placeholder="Tu nombre" required>
                        </div>
                        <div class="input-group">
                            <label for="email">Correo electrónico</label>
                            <input id="email" name="email" type="email" placeholder="tu@correo.com" required>
                        </div>
                        <div class="input-group">
                            <label for="message">Mensaje</label>
                            <textarea id="message" name="message" rows="6"
                                placeholder="Cuéntanos cómo podemos ayudarte..."></textarea>
                        </div>
                        <div class="text-center">
                            <button type="submit" class="btn-primary btn-full">Enviar Mensaje</button>
                        </div>
                    </form>
                </div>
                <br>
                <aside class="contact-info-card">
                    <h3>Información</h3>
                    <p><i class="fas fa-map-marker-alt"></i> Cartagena, Colombia</p>
                    <p><i class="fas fa-envelope"></i> soporte@eventhive.com</p>
                    <p><i class="fas fa-phone"></i> +57 300 000 0000</p>
                    <div style="margin-top:1rem">
                        <a href="/signin" class="btn-cta">Regístrate</a>
                    </div>
                </aside>
            </div>
        </section>
    </main>

    <footer class="main-footer">
        <div th:replace="~{fragments/footer :: footer}"></div>
    </footer>

</body>

</html>
