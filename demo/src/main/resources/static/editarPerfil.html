<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Perfil | EventHive</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>
    <header class="main-header">
        <div th:replace="~{fragments/navbar :: navbar}"></div>
    </header>

    <main class="container" style="padding:3rem 0;">
        <section class="edit-profile-section">
            <h1 class="section-title">Editar Perfil</h1>

            <div class="profile-edit-grid">
                <div class="profile-edit-card">
                    <form class="contact-form" th:action="@{/editarPerfil}" method="post" id="editProfileForm">
                        <div class="input-group">
                            <label for="nombre">Nombre completo</label>
                            <input id="nombre" name="nombre" type="text" placeholder="Tu nombre completo"
                                th:value="${usuarioActual.nombre}" required>
                        </div>

                        <div class="input-group">
                            <label for="correo">Correo electrónico</label>
                            <input id="correo" name="correo" type="email" placeholder="tu@correo.com"
                                th:value="${usuarioActual.correo}" required>
                        </div>

                        <div class="input-group">
                            <label for="telefono">Teléfono</label>
                            <input id="telefono" name="telefono" type="tel" placeholder="300 123 4567"
                                th:value="${usuarioActual.telefono}" required>
                        </div>

                        <div class="input-group">
                            <label for="password">Nueva contraseña</label>
                            <input id="password" name="password" type="password"
                                placeholder="Dejar en blanco para mantener">
                        </div>

                        <div class="text-center">
                            <button class="btn-primary btn-full" type="submit">Guardar cambios</button>
                        </div>
                    </form>
                </div>

                <aside class="profile-edit-preview">
                    <div class="profile-details-card">
                        <div class="avatar-placeholder">
                            <i class="fas fa-user-circle fa-5x"></i>
                        </div>
                        <h3 th:text="${usuarioActual.nombre}"></h3>
                        <p class="muted">Actualiza tus datos personales y contraseña. Tu información se guarda de forma segura.</p>
                        <div style="margin-top:1rem">
                            <a href="/perfil" class="btn-secondary">Volver a Mi Perfil</a>
                        </div>
                    </div>
                </aside>
            </div>
        </section>
    </main>

    <footer class="main-footer">
        <div th:replace="~{fragments/footer :: footer}"></div>
    </footer>

    <script src="js/RespuestaEditarPerfil.js"> </script>
</body>
</html>
