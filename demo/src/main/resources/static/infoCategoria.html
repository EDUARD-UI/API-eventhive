<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Categoría — EventHive</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { display: ['Syne','sans-serif'], body: ['DM Sans','sans-serif'] },
          colors: { brand: '#007bff', accent: '#ffc107', dark: '#212529' }
        }
      }
    }
  </script>
  <style>
    body { font-family:'DM Sans',sans-serif; background:#fff; color:#212529; }
    h1,h2,h3 { font-family:'Syne',sans-serif; }

    #catBanner {
      background: linear-gradient(to bottom, rgba(0,0,0,.52) 0%, rgba(0,0,0,.78) 100%),
                  #1d2c3d center/cover no-repeat;
    }

    .event-card { transition: transform .25s ease, box-shadow .25s ease; }
    .event-card:hover { transform: translateY(-5px); box-shadow: 0 16px 40px rgba(0,123,255,.13); }

    .pg-btn { transition: background .2s, color .2s, border-color .2s; }
    .pg-btn:disabled { opacity:.35; cursor:not-allowed; }
    .pg-btn.active { background:#007bff; color:#fff; border-color:#007bff; }

    ::-webkit-scrollbar{width:5px} ::-webkit-scrollbar-thumb{background:#ddd;border-radius:4px}
  </style>
</head>
<body>

<!-- ══ NAV ══════════════════════════════════════════════ -->
<nav class="sticky top-0 z-40 bg-white/95 backdrop-blur-md border-b border-gray-100 shadow-sm">
  <div class="max-w-7xl mx-auto px-6 py-4 flex items-center gap-6">
    <a href="/index.html" class="font-display font-extrabold text-xl tracking-tight text-dark mr-auto">
      Event<span class="text-brand">Hive</span>
    </a>
    <a href="/index.html"
      class="text-dark/50 hover:text-brand text-sm transition flex items-center gap-1.5">
      <i class="fas fa-chevron-left text-xs"></i> Inicio
    </a>
    <a href="/eventos" class="text-dark/50 hover:text-brand text-sm transition">Eventos</a>
  </div>
</nav>

<!-- ══ BANNER ════════════════════════════════════════════ -->
<div id="catBanner" class="py-20 px-6">
  <div class="max-w-7xl mx-auto">

    <!-- Breadcrumb -->
    <div class="flex items-center gap-2 text-white/50 text-xs mb-6">
      <a href="/index.html" class="hover:text-white transition">Inicio</a>
      <i class="fas fa-chevron-right text-[10px]"></i>
      <a href="/eventos" class="hover:text-white transition">Eventos</a>
      <i class="fas fa-chevron-right text-[10px]"></i>
      <span id="breadCat" class="text-white/80">Categoría</span>
    </div>

    <div class="flex flex-col md:flex-row md:items-end justify-between gap-6">
      <div>
        <span class="inline-block bg-accent text-dark text-[10px] font-bold
                     tracking-widest uppercase px-3 py-1.5 rounded-full mb-4">
          Categoría
        </span>
        <h1 id="catNombre" class="text-5xl md:text-6xl font-extrabold text-white leading-tight">—</h1>
      </div>
      <p id="catConteo" class="text-white/50 text-sm font-medium shrink-0"></p>
    </div>
  </div>
</div>

<!-- Barra separadora azul/amarillo -->
<div class="h-1 bg-gradient-to-r from-brand via-accent to-transparent"></div>

<!-- ══ CONTENIDO ═════════════════════════════════════════ -->
<main class="max-w-7xl mx-auto px-6 py-14">

  <div class="flex items-center justify-between mb-8">
    <h2 class="text-xl font-bold text-dark">Todos los eventos</h2>
    <a href="/eventos"
      class="text-sm text-brand hover:underline flex items-center gap-1.5 font-medium">
      Ver todos <i class="fas fa-arrow-right text-xs"></i>
    </a>
  </div>

  <!-- Grid -->
  <div id="eventosGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5">
    <div class="h-72 rounded-2xl bg-gray-100 animate-pulse"></div>
    <div class="h-72 rounded-2xl bg-gray-100 animate-pulse"></div>
    <div class="h-72 rounded-2xl bg-gray-100 animate-pulse"></div>
    <div class="h-72 rounded-2xl bg-gray-100 animate-pulse"></div>
  </div>

  <!-- Estado vacío -->
  <div id="emptyState" class="hidden text-center py-24">
    <div class="w-20 h-20 rounded-full bg-gray-100 flex items-center justify-center mx-auto mb-5">
      <i class="fas fa-calendar-times text-2xl text-gray-300"></i>
    </div>
    <h3 class="font-display font-bold text-2xl text-dark/30 mb-2">Sin eventos por ahora</h3>
    <p class="text-dark/30 mb-8">Esta categoría no tiene eventos publicados aún.</p>
    <a href="/eventos"
      class="inline-flex items-center gap-2 border border-gray-200 text-dark/50
             hover:border-brand hover:text-brand text-sm font-medium px-6 py-3 rounded-2xl transition">
      <i class="fas fa-arrow-left text-xs"></i> Ver todos los eventos
    </a>
  </div>

  <!-- Paginación -->
  <div id="paginacion" class="hidden mt-12 flex items-center justify-center gap-2 flex-wrap">
    <button id="pgPrev"
      class="pg-btn flex items-center gap-1.5 px-4 py-2.5 rounded-xl border border-gray-200
             text-dark/50 text-sm font-medium hover:border-brand hover:text-brand">
      <i class="fas fa-chevron-left text-xs"></i> Anterior
    </button>
    <div id="pgNumbers" class="flex gap-1.5"></div>
    <button id="pgNext"
      class="pg-btn flex items-center gap-1.5 px-4 py-2.5 rounded-xl border border-gray-200
             text-dark/50 text-sm font-medium hover:border-brand hover:text-brand">
      Siguiente <i class="fas fa-chevron-right text-xs"></i>
    </button>
  </div>
  <p id="pgInfo" class="text-center text-dark/30 text-xs mt-4"></p>

</main>

<!-- ══ FOOTER ════════════════════════════════════════════ -->
<footer class="bg-dark mt-10 py-10">
  <div class="max-w-7xl mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-4 text-white/40 text-sm">
    <span class="font-display font-bold text-white/70">
      Event<span class="text-brand">Hive</span>
    </span>
    <span>© 2025 EventHive · Todos los derechos reservados</span>
    <div class="flex gap-5">
      <a href="#" class="hover:text-white transition"><i class="fab fa-instagram"></i></a>
      <a href="#" class="hover:text-white transition"><i class="fab fa-facebook"></i></a>
      <a href="#" class="hover:text-white transition"><i class="fab fa-tiktok"></i></a>
    </div>
  </div>
</footer>

<script src="/js/infoCategoria.js"></script>
</body>
</html>
