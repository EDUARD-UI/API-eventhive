<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Evento — EventHive</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script>tailwind.config={theme:{extend:{fontFamily:{display:['Syne','sans-serif'],body:['DM Sans','sans-serif']},colors:{brand:'#007bff',accent:'#ffc107',dark:'#212529'}}}}</script>
  <style>
    body{font-family:'DM Sans',sans-serif;background:#fff;color:#212529}
    h1,h2,h3{font-family:'Syne',sans-serif}
    #heroBanner{background:linear-gradient(to bottom,rgba(0,0,0,.5) 0%,rgba(0,0,0,.78) 100%),#1d2c3d center/cover no-repeat}
    .localidad-card{transition:border-color .2s,box-shadow .2s}
    .localidad-card:hover{border-color:#007bff;box-shadow:0 8px 30px rgba(0,123,255,.1)}
  </style>
</head>
<body class="min-h-screen flex flex-col">

<nav class="fixed top-0 left-0 right-0 z-40 bg-white/95 backdrop-blur-md border-b border-gray-100 shadow-sm">
  <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
    <a href="/index.html" class="font-display font-extrabold text-2xl tracking-tight text-dark">Event<span class="text-brand">Hive</span></a>
    <div class="hidden md:flex items-center gap-8 text-sm font-medium text-dark/60">
      <a href="/index.html" class="hover:text-brand transition">Inicio</a>
      <a href="/eventos.html" class="hover:text-brand transition">Eventos</a>
      <a href="/nosotros.html" class="hover:text-brand transition">Nosotros</a>
      <a href="/contactanos.html" class="hover:text-brand transition">Contacto</a>
    </div>
    <div id="navAuth" class="flex items-center gap-3 text-sm"></div>
  </div>
</nav>

<!-- HERO BANNER -->
<div id="heroBanner" class="pt-28 pb-16 px-6">
  <div class="max-w-7xl mx-auto">
    <div class="flex items-center gap-2 text-white/50 text-xs mb-6">
      <a href="/index.html" class="hover:text-white transition">Inicio</a>
      <i class="fas fa-chevron-right text-[10px]"></i>
      <a href="/eventos.html" class="hover:text-white transition">Eventos</a>
      <i class="fas fa-chevron-right text-[10px]"></i>
      <span id="breadNombre" class="text-white/80">Evento</span>
    </div>
    <div id="heroCat" class="hidden mb-4">
      <span class="bg-accent text-dark text-[10px] font-bold tracking-widest uppercase px-3 py-1.5 rounded-full"></span>
    </div>
    <h1 id="heroTitulo" class="text-4xl md:text-6xl font-extrabold text-white leading-tight mb-4">—</h1>
    <div id="heroMeta" class="flex flex-wrap gap-5 text-white/60 text-sm"></div>
  </div>
</div>
<div class="h-1 bg-gradient-to-r from-brand via-accent to-transparent"></div>

<!-- MAIN -->
<main class="flex-1 max-w-7xl mx-auto px-6 py-12 w-full">
  <div id="skeleton" class="grid grid-cols-1 lg:grid-cols-3 gap-10">
    <div class="lg:col-span-2 space-y-4">
      <div class="h-64 rounded-3xl bg-gray-100 animate-pulse"></div>
      <div class="h-4 w-3/4 bg-gray-100 rounded animate-pulse"></div>
      <div class="h-4 w-1/2 bg-gray-100 rounded animate-pulse"></div>
    </div>
    <div class="space-y-4">
      <div class="h-48 rounded-3xl bg-gray-100 animate-pulse"></div>
      <div class="h-48 rounded-3xl bg-gray-100 animate-pulse"></div>
    </div>
  </div>

  <div id="contenido" class="hidden grid grid-cols-1 lg:grid-cols-3 gap-10">
    <!-- Descripción -->
    <div class="lg:col-span-2">
      <div id="eventoImg" class="hidden mb-8 rounded-3xl overflow-hidden h-80 bg-gray-100">
        <img id="imgEl" src="" alt="" class="w-full h-full object-cover"/>
      </div>
      <div class="bg-white rounded-3xl border border-gray-100 shadow-sm p-8">
        <p class="text-brand text-[11px] font-bold tracking-[0.3em] uppercase mb-3">Descripción</p>
        <h2 class="text-2xl font-extrabold text-dark mb-4">Sobre este evento</h2>
        <p id="eventoDesc" class="text-dark/60 leading-relaxed text-sm"></p>
      </div>
    </div>

    <!-- Localidades -->
    <div>
      <p class="text-brand text-[11px] font-bold tracking-[0.3em] uppercase mb-4">Localidades</p>
      <div id="localidadesContainer" class="space-y-4"></div>
      <div id="noLocalidades" class="hidden bg-gray-50 rounded-3xl border border-gray-100 p-8 text-center">
        <i class="fas fa-ticket-alt text-3xl text-gray-200 mb-3 block"></i>
        <p class="text-dark/35 text-sm">No hay localidades disponibles.</p>
      </div>
    </div>
  </div>

  <!-- No encontrado -->
  <div id="notFound" class="hidden text-center py-24">
    <i class="fas fa-calendar-times text-5xl text-gray-200 mb-4 block"></i>
    <h3 class="font-extrabold text-2xl text-dark/30 mb-2">Evento no encontrado</h3>
    <a href="/eventos.html" class="text-brand hover:underline text-sm">← Volver a eventos</a>
  </div>
</main>

<footer class="bg-dark border-t border-white/5 py-8 mt-10">
  <div class="max-w-7xl mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-4 text-white/40 text-sm">
    <span class="font-display font-bold text-white/70">Event<span class="text-brand">Hive</span></span>
    <span>© 2025 EventHive · Todos los derechos reservados</span>
    <div class="flex gap-5">
      <a href="#" class="hover:text-white transition"><i class="fab fa-instagram"></i></a>
      <a href="#" class="hover:text-white transition"><i class="fab fa-facebook"></i></a>
      <a href="#" class="hover:text-white transition"><i class="fab fa-tiktok"></i></a>
    </div>
  </div>
</footer>

<script src="/js/infoEvento.js"></script>
</body></html>
