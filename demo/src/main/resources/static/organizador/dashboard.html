<!-- ═══════════════════════════════════════════════
     dashboard.html  —  sección inicio / dashboard
     Inyectado en #page-content por el router
═══════════════════════════════════════════════ -->

<!-- Hero dark -->
<div class="dash-hero">
  <div class="hero-greeting" id="h-greeting">Bienvenido 👋</div>
  <div class="hero-sub">Aquí tienes un resumen de tu actividad</div>
  <div class="hero-date" id="h-date"></div>
  <div class="hero-actions">
    <button class="btn btn-primary" onclick="Router.go('eventos')">+ Crear evento</button>
    <button class="btn btn-amber"   onclick="Router.go('localidades')">🏟 Nueva localidad</button>
    <button class="btn btn-ghost"
            style="color:#5a7a9a;border-color:#1a2a4a"
            onclick="Router.go('promociones')">🏷 Promoción</button>
  </div>
</div>

<!-- Stats strip -->
<div class="stats-strip">
  <div class="stat-tile">
    <div class="st-icon" style="background:var(--blue-l)">🗓</div>
    <div>
      <div class="st-val" id="st-ev">—</div>
      <div class="st-lbl">Eventos creados</div>
    </div>
  </div>
  <div class="stat-tile">
    <div class="st-icon" style="background:var(--amber-l)">🏟</div>
    <div>
      <div class="st-val" id="st-loc">—</div>
      <div class="st-lbl">Localidades activas</div>
    </div>
  </div>
  <div class="stat-tile">
    <div class="st-icon" style="background:var(--green-l)">🏷</div>
    <div>
      <div class="st-val" id="st-pr">—</div>
      <div class="st-lbl">Promociones vigentes</div>
    </div>
  </div>
</div>

<!-- Dos columnas: timeline + accesos rápidos -->
<div class="dash-cols">

  <!-- Timeline -->
  <div class="card-inner">
    <div class="flex-between" style="margin-bottom:18px">
      <div style="font-family:'Fraunces',serif;font-weight:800;font-size:1.05rem">
        Próximos eventos
      </div>
      <button class="btn btn-ghost btn-sm" onclick="Router.go('eventos')">Ver todos →</button>
    </div>
    <div class="tl" id="dash-tl">
      <div style="color:var(--muted);font-size:.85rem;padding:16px 0">Cargando...</div>
    </div>
  </div>

  <!-- Accesos rápidos -->
  <div style="display:flex;flex-direction:column;gap:12px">
    <div style="font-family:'Fraunces',serif;font-weight:800;font-size:1.05rem">
      Accesos rápidos
    </div>
    <div class="qa-tile"
         style="background:linear-gradient(135deg,var(--blue),#0066dd)"
         onclick="Router.go('eventos')">
      <div class="qa-icon">🗓</div>
      <div class="qa-name" style="color:#fff">Crear evento</div>
      <div class="qa-desc" style="color:rgba(255,255,255,.6)">Nuevo evento desde cero</div>
    </div>
    <div class="qa-tile"
         style="background:var(--amber-l);border:1.5px solid var(--amber)"
         onclick="Router.go('localidades')">
      <div class="qa-icon">🏟</div>
      <div class="qa-name">Nueva localidad</div>
      <div class="qa-desc" style="color:var(--muted)">Añadir zona a un evento</div>
    </div>
    <div class="qa-tile"
         style="background:var(--green-l);border:1.5px solid #86efac"
         onclick="Router.go('promociones')">
      <div class="qa-icon">🏷</div>
      <div class="qa-name">Nueva promoción</div>
      <div class="qa-desc" style="color:var(--muted)">Crear descuento especial</div>
    </div>
  </div>

</div>

<!-- JS específico del dashboard (se ejecuta tras inyectarse en el DOM) -->
<script src="../js/organizador/dashboard.js"></script>
