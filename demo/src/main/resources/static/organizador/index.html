<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EventHive — Panel del Organizador</title>
  <link rel="stylesheet" href="../css/organizador/variables.css"/>
  <link rel="stylesheet" href="../css/organizador/sidebar.css"/>
  <link rel="stylesheet" href="../css/organizador/components.css"/>
  <link rel="stylesheet" href="../css/organizador/pages.css"/>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

  <nav id="sidebar">
    <div class="sb-brand">
      <div class="sb-hex">H</div>
      <div class="sb-brand-name">Event<em>Hive</em></div>
    </div>

    <div class="nav-grp">Principal</div>
    <a class="nav-item active" data-s="dashboard" href="#">
      <span class="ni">⚡</span> Dashboard
    </a>
    <a class="nav-item" data-s="eventos" href="#">
      <span class="ni">🗓</span> Mis Eventos
      <span class="nb" id="nb-ev">0</span>
    </a>

    <div class="nav-grp">Gestión</div>
    <a class="nav-item" data-s="localidades" href="#">
      <span class="ni">🏟</span> Localidades
    </a>
    <a class="nav-item" data-s="promociones" href="#">
      <span class="ni">🏷</span> Promociones
    </a>

    <div class="nav-grp">Cuenta</div>
    <a class="nav-item" data-s="perfil" href="#">
      <span class="ni">👤</span> Mi Perfil
    </a>

    <div class="sb-bottom">
      <div class="sb-user">
        <div class="sb-avatar" id="sb-av">OG</div>
        <div>
          <div class="sb-uname" id="sb-nm">Organizador</div>
          <div class="sb-urole">Organizador de Eventos</div>
        </div>
      </div>
      <div class="sb-logout" id="btn-logout">
        <span>↩</span> Cerrar sesión
      </div>
    </div>
  </nav>

  <div id="main">
    <header class="topbar">
      <div class="topbar-title" id="topbar-title">Dashboard</div>
      <span id="topbar-sub" style="font-size:.78rem;color:var(--muted)"></span>
    </header>
    <div class="page" id="page-content">
      <div style="display:flex;align-items:center;justify-content:center;height:60vh;color:var(--muted)">
        Cargando...
      </div>
    </div>
  </div>

  <div id="toast-wrap"></div>

  <!-- Módulos cargados estáticamente para que initXxx() existan en el scope global -->
  <script src="../js/organizador/org-dashboard.js"></script>
  <script src="../js/organizador/org-eventos.js"></script>
  <script src="../js/organizador/org-localidades.js"></script>
  <script src="../js/organizador/org-promociones.js"></script>
  <script src="../js/organizador/org-perfil.js"></script>

  <!-- Script principal (debe ir ÚLTIMO) -->
  <script src="../js/organizador/org-main.js"></script>
</body>
</html>
