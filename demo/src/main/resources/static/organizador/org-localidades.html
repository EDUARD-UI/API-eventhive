<!-- demo/src/main/resources/static/organizador/org-localidades.html -->

<div class="sec-head">
  <div>
    <h2>Localidades</h2>
    <p>Zonas y capacidades de tus eventos</p>
  </div>
  <button class="btn btn-primary" onclick="openModal('modal-localidad')">+ Nueva localidad</button>
</div>

<div class="toolbar">
  <div class="search-box">
    <span class="si">🔍</span>
    <input type="text" id="loc-srch" placeholder="Buscar zona o evento..." oninput="filtrarLocalidades()"/>
  </div>
  <div class="view-toggle">
    <button class="vt active" id="vt-grid-loc" onclick="toggleVistaLoc('grid')">⊞ Cards</button>
    <button class="vt"        id="vt-table-loc" onclick="toggleVistaLoc('table')">≡ Tabla</button>
  </div>
</div>

<div id="loc-grid" class="cards-grid"></div>

<div id="loc-table" style="display:none">
  <div class="tbl-wrap">
    <table>
      <thead>
        <tr>
          <th>Zona</th><th>Evento</th><th>Capacidad</th>
          <th>Disponibles</th><th>Precio</th><th>Ocupación</th><th>Acciones</th>
        </tr>
      </thead>
      <tbody id="loc-tbody"></tbody>
    </table>
  </div>
</div>

<!-- MODAL Localidad -->
<div class="modal-overlay" id="modal-localidad">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal('modal-localidad')">✕</button>
    <div class="modal-title" id="mt-loc">Nueva localidad</div>
    <form id="form-localidad" onsubmit="submitLocalidad(event)">
      <input type="hidden" id="loc-id"/>
      <div class="fg"><label class="fl">Nombre de la zona</label>
        <input class="fi" id="loc-nom" type="text" placeholder="VIP, General, Palco..." required/></div>
      <div class="fg"><label class="fl">Evento</label>
        <select class="fs" id="loc-ev" required><option value="">Seleccionar evento...</option></select></div>
      <div class="fgrid">
        <div class="fg"><label class="fl">Capacidad total</label>
          <input class="fi" id="loc-cap" type="number" min="1" required/></div>
        <div class="fg"><label class="fl">Disponibles</label>
          <input class="fi" id="loc-dis" type="number" min="0" required/></div>
      </div>
      <div class="fg"><label class="fl">Precio por boleto (COP)</label>
        <input class="fi" id="loc-pre" type="number" min="0" step="0.01" required/></div>
      <div class="f-actions">
        <button type="button" class="btn btn-ghost" onclick="closeModal('modal-localidad')">Cancelar</button>
        <button type="submit" class="btn btn-primary" id="btn-loc">Crear localidad</button>
      </div>
    </form>
  </div>
</div>

<script src="../js/organizador/org-localidades.js"></script>
