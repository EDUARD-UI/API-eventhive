<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Error — EventHive</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <script>tailwind.config={theme:{extend:{fontFamily:{display:['Syne','sans-serif'],body:['DM Sans','sans-serif']},colors:{brand:'#007bff',accent:'#ffc107',dark:'#212529'}}}}</script>
  <style>
    body{font-family:'DM Sans',sans-serif;background:#fff;color:#212529}
    h1,h2{font-family:'Syne',sans-serif}
    @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    .fade-up{animation:fadeUp .6s ease both}
    .d1{animation-delay:.1s}.d2{animation-delay:.2s}.d3{animation-delay:.3s}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
    .float{animation:float 3s ease-in-out infinite}
  </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center px-6" style="background:radial-gradient(ellipse at 50% 0%,rgba(0,123,255,.05) 0%,transparent 70%)">

  <div class="text-center max-w-md">
    <div class="float mb-8">
      <div class="w-24 h-24 rounded-3xl bg-brand/10 flex items-center justify-center mx-auto">
        <i class="fas fa-exclamation-triangle text-brand text-4xl"></i>
      </div>
    </div>

    <p class="fade-up text-brand text-[11px] font-bold tracking-[0.3em] uppercase mb-4">Algo salió mal</p>
    <h1 class="fade-up d1 text-6xl font-extrabold text-dark mb-2">¡Ups!</h1>
    <p class="fade-up d2 text-dark/50 text-base mb-10 leading-relaxed">
      Ha ocurrido un error inesperado. Nuestro equipo ya está trabajando para solucionarlo.
    </p>

    <div class="fade-up d3 flex items-center justify-center gap-4">
      <button onclick="window.history.back()"
        class="flex items-center gap-2 border border-gray-200 text-dark hover:border-brand hover:text-brand font-bold px-6 py-3 rounded-2xl transition text-sm">
        <i class="fas fa-arrow-left text-xs"></i> Volver atrás
      </button>
      <a href="../index.html"
        class="flex items-center gap-2 bg-brand hover:bg-blue-700 text-white font-bold px-6 py-3 rounded-2xl transition text-sm shadow-lg shadow-brand/20">
        <i class="fas fa-home text-xs"></i> Ir al inicio
      </a>
    </div>
  </div>

</body></html>
