<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Eventos — EventHive</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <script>tailwind.config={theme:{extend:{fontFamily:{display:['Syne','sans-serif'],body:['DM Sans','sans-serif']},colors:{brand:'#007bff',accent:'#ffc107',dark:'#212529'}}}}</script>
  <style>
    body{font-family:'DM Sans',sans-serif;background:#fff;color:#212529}
    h1,h2,h3{font-family:'Syne',sans-serif}
    .event-card{transition:transform .25s ease,box-shadow .25s ease}
    .event-card:hover{transform:translateY(-5px);box-shadow:0 16px 40px rgba(0,123,255,.13)}
    ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:#ddd;border-radius:4px}
  </style>
</head>
<body class="min-h-screen flex flex-col">

<nav class="fixed top-0 left-0 right-0 z-40 bg-white/95 backdrop-blur-md border-b border-gray-100 shadow-sm">
  <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
    <a href="../index.html" class="font-display font-extrabold text-2xl tracking-tight text-dark">Event<span class="text-brand">Hive</span></a>
    <div class="hidden md:flex items-center gap-8 text-sm font-medium text-dark/60">
      <a href="../index.html" class="hover:text-brand transition">Inicio</a>
      <a href="eventos.html" class="text-brand font-bold">Eventos</a>
      <a href="nosotros.html" class="hover:text-brand transition">Nosotros</a>
      <a href="contactanos.html" class="hover:text-brand transition">Contacto</a>
    </div>
    <div id="navAuth" class="flex items-center gap-3 text-sm"></div>
  </div>
</nav>

<!-- HEADER -->
<header class="pt-32 pb-10 px-6" style="background:radial-gradient(ellipse at 50% 0%,rgba(0,123,255,.07) 0%,transparent 70%)">
  <div class="max-w-7xl mx-auto">
    <p class="text-brand text-[11px] font-bold tracking-[0.3em] uppercase mb-3">Cartelera completa</p>
    <div class="flex flex-col md:flex-row md:items-end justify-between gap-4">
      <h1 class="text-4xl md:text-5xl font-extrabold text-dark">Todas las <span class="text-dark/25">categorías</span></h1>
      <!-- filtro por categoría -->
      <select id="filtroCategoria" class="border border-gray-200 rounded-2xl px-4 py-2.5 text-sm text-dark bg-white outline-none cursor-pointer focus:border-brand">
        <option value="">Todas las categorías</option>
      </select>
    </div>
  </div>
</header>

<div class="h-1 bg-gradient-to-r from-brand via-accent to-transparent"></div>

<main class="flex-1 max-w-7xl mx-auto px-6 py-12 w-full">
  <div id="contenido">
    <!-- skeletons -->
    <div class="mb-14">
      <div class="h-6 w-40 bg-gray-100 rounded-xl animate-pulse mb-6"></div>
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5">
        <div class="h-72 rounded-2xl bg-gray-100 animate-pulse"></div>
        <div class="h-72 rounded-2xl bg-gray-100 animate-pulse"></div>
        <div class="h-72 rounded-2xl bg-gray-100 animate-pulse"></div>
        <div class="h-72 rounded-2xl bg-gray-100 animate-pulse"></div>
      </div>
    </div>
  </div>
  <div id="emptyState" class="hidden text-center py-24">
    <div class="w-20 h-20 rounded-full bg-gray-100 flex items-center justify-center mx-auto mb-5">
      <i class="fas fa-calendar-times text-2xl text-gray-300"></i>
    </div>
    <h3 class="font-extrabold text-2xl text-dark/30 mb-2">Sin eventos disponibles</h3>
    <p class="text-dark/30">No hay eventos publicados en esta categoría.</p>
  </div>
</main>

<footer class="bg-dark border-t border-white/5 py-8 mt-10">
  <div class="max-w-7xl mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-4 text-white/40 text-sm">
    <span class="font-display font-bold text-white/70">Event<span class="text-brand">Hive</span></span>
    <span>© 2025 EventHive · Todos los derechos reservados</span>
    <div class="flex gap-5">
      <a href="#" class="hover:text-white transition"><i class="fab fa-instagram"></i></a>
      <a href="#" class="hover:text-white transition"><i class="fab fa-facebook"></i></a>
      <a href="#" class="hover:text-white transition"><i class="fab fa-tiktok"></i></a>
    </div>
  </div>
</footer>

<script src="/js/eventos.js"></script>
</body></html>
