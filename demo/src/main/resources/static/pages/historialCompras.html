<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Historial de Compras — EventHive</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script>tailwind.config={theme:{extend:{fontFamily:{display:['Syne','sans-serif'],body:['DM Sans','sans-serif']},colors:{brand:'#007bff',accent:'#ffc107',dark:'#212529'}}}}</script>
  <style>
    body{font-family:'DM Sans',sans-serif;background:#fff;color:#212529}
    h1,h2,h3{font-family:'Syne',sans-serif}
  </style>
</head>
<body class="min-h-screen flex flex-col">

<nav class="fixed top-0 left-0 right-0 z-40 bg-white/95 backdrop-blur-md border-b border-gray-100 shadow-sm">
  <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
    <a href="../index.html" class="font-display font-extrabold text-2xl tracking-tight text-dark">Event<span class="text-brand">Hive</span></a>
    <div class="hidden md:flex items-center gap-8 text-sm font-medium text-dark/60">
      <a href="../index.html" class="hover:text-brand transition">Inicio</a>
      <a href="perfil.html" class="hover:text-brand transition">Mi Perfil</a>
    </div>
    <a href="perfil.html" class="text-sm text-dark/50 hover:text-brand transition flex items-center gap-2">
      <i class="fas fa-arrow-left text-xs"></i> Volver al perfil
    </a>
  </div>
</nav>

<header class="pt-32 pb-10 px-6" style="background:radial-gradient(ellipse at 50% 0%,rgba(0,123,255,.07) 0%,transparent 70%)">
  <div class="max-w-5xl mx-auto">
    <p class="text-brand text-[11px] font-bold tracking-[0.3em] uppercase mb-3">Mis compras</p>
    <h1 class="text-4xl font-extrabold text-dark">Historial de Compras</h1>
  </div>
</header>
<div class="h-1 bg-gradient-to-r from-brand via-accent to-transparent"></div>

<main class="flex-1 max-w-5xl mx-auto px-6 py-12 w-full">
  <!-- skeleton -->
  <div id="skeleton" class="space-y-4">
    <div class="h-24 rounded-3xl bg-gray-100 animate-pulse"></div>
    <div class="h-24 rounded-3xl bg-gray-100 animate-pulse"></div>
    <div class="h-24 rounded-3xl bg-gray-100 animate-pulse"></div>
  </div>

  <div id="lista" class="hidden space-y-4"></div>

  <div id="vacio" class="hidden text-center py-24">
    <i class="fas fa-shopping-cart text-5xl text-gray-200 mb-4 block"></i>
    <h3 class="font-extrabold text-2xl text-dark/30 mb-2">Sin compras aún</h3>
    <p class="text-dark/30 text-sm mb-6">Explora nuestros eventos y adquiere tus boletos.</p>
    <a href="eventos.html" class="inline-flex items-center gap-2 bg-brand text-white font-bold px-6 py-3 rounded-2xl hover:bg-blue-700 transition text-sm shadow-lg shadow-brand/20">
      Ver eventos <i class="fas fa-arrow-right text-xs"></i>
    </a>
  </div>
</main>

<footer class="bg-dark border-t border-white/5 py-8">
  <div class="max-w-7xl mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-4 text-white/40 text-sm">
    <span class="font-display font-bold text-white/70">Event<span class="text-brand">Hive</span></span>
    <span>© 2025 EventHive · Todos los derechos reservados</span>
    <div class="flex gap-5">
      <a href="#" class="hover:text-white transition"><i class="fab fa-instagram"></i></a>
      <a href="#" class="hover:text-white transition"><i class="fab fa-facebook"></i></a>
      <a href="#" class="hover:text-white transition"><i class="fab fa-tiktok"></i></a>
    </div>
  </div>
</footer>

<script src="/js/historialDeCompras.js"></script>
</body></html>
