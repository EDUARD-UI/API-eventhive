<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mis Boletos — EventHive</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script>tailwind.config={theme:{extend:{fontFamily:{display:['Syne','sans-serif'],body:['DM Sans','sans-serif']},colors:{brand:'#007bff',accent:'#ffc107',dark:'#212529'}}}}</script>
  <style>
    body{font-family:'DM Sans',sans-serif;background:#fff;color:#212529}
    h1,h2,h3{font-family:'Syne',sans-serif}
    @media print{nav,footer,.no-print{display:none!important}.boleto{break-inside:avoid}}
    .boleto-card{background:repeating-linear-gradient(90deg,transparent,transparent 10px,rgba(0,123,255,.03) 10px,rgba(0,123,255,.03) 11px)}
  </style>
</head>
<body class="min-h-screen flex flex-col">

<nav class="fixed top-0 left-0 right-0 z-40 bg-white/95 backdrop-blur-md border-b border-gray-100 shadow-sm no-print">
  <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
    <a href="../index.html" class="font-display font-extrabold text-2xl tracking-tight text-dark">Event<span class="text-brand">Hive</span></a>
    <a href="historialCompras.html" class="text-sm text-dark/50 hover:text-brand transition flex items-center gap-2">
      <i class="fas fa-arrow-left text-xs"></i> Historial
    </a>
  </div>
</nav>

<main class="flex-1 max-w-3xl mx-auto px-6 pt-28 pb-16 w-full">
  <div class="mb-8">
    <p class="text-brand text-[11px] font-bold tracking-[0.3em] uppercase mb-2">Tus boletos</p>
    <h1 class="text-4xl font-extrabold text-dark">Mis Boletos</h1>
    <p id="compraInfo" class="text-dark/40 text-sm mt-1"></p>
  </div>

  <!-- skeleton -->
  <div id="skeleton" class="space-y-6">
    <div class="h-64 rounded-3xl bg-gray-100 animate-pulse"></div>
    <div class="h-64 rounded-3xl bg-gray-100 animate-pulse"></div>
  </div>

  <div id="boletos" class="hidden space-y-6"></div>

  <div id="vacio" class="hidden text-center py-20">
    <i class="fas fa-ticket-alt text-5xl text-gray-200 mb-4 block"></i>
    <p class="text-dark/30">No se encontraron boletos para esta compra.</p>
  </div>

  <!-- acciones -->
  <div id="acciones" class="hidden no-print mt-8 flex gap-3">
    <button onclick="window.print()"
      class="flex items-center gap-2 border border-gray-200 text-dark hover:border-brand hover:text-brand font-bold px-6 py-3 rounded-2xl transition text-sm">
      <i class="fas fa-print text-xs"></i> Imprimir
    </button>
    <a href="historialCompras.html"
      class="flex items-center gap-2 bg-brand hover:bg-blue-700 text-white font-bold px-6 py-3 rounded-2xl transition text-sm shadow-lg shadow-brand/20">
      <i class="fas fa-arrow-left text-xs"></i> Volver al historial
    </a>
  </div>
</main>

<footer class="bg-dark border-t border-white/5 py-8 no-print">
  <div class="max-w-7xl mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-4 text-white/40 text-sm">
    <span class="font-display font-bold text-white/70">Event<span class="text-brand">Hive</span></span>
    <span>© 2025 EventHive · Todos los derechos reservados</span>
  </div>
</footer>

<script src="/js/MisBoletos.js"></script>
</body></html>
