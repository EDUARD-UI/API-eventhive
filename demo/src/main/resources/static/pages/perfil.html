<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mi Perfil — EventHive</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script>tailwind.config={theme:{extend:{fontFamily:{display:['Syne','sans-serif'],body:['DM Sans','sans-serif']},colors:{brand:'#007bff',accent:'#ffc107',dark:'#212529'}}}}</script>
  <style>
    body{font-family:'DM Sans',sans-serif;background:#fff;color:#212529}
    h1,h2,h3{font-family:'Syne',sans-serif}
    input:focus{outline:none;border-color:#007bff;box-shadow:0 0 0 3px rgba(0,123,255,.12)}
    .tab-btn.active{background:#007bff;color:#fff;border-color:#007bff}
  </style>
</head>
<body class="min-h-screen flex flex-col">

<nav class="fixed top-0 left-0 right-0 z-40 bg-white/95 backdrop-blur-md border-b border-gray-100 shadow-sm">
  <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
    <a href="../index.html" class="font-display font-extrabold text-2xl tracking-tight text-dark">Event<span class="text-brand">Hive</span></a>
    <div class="hidden md:flex items-center gap-8 text-sm font-medium text-dark/60">
      <a href="../index.html" class="hover:text-brand transition">Inicio</a>
      <a href="eventos.html" class="hover:text-brand transition">Eventos</a>
    </div>
    <button id="btnLogout" class="text-sm text-dark/50 hover:text-brand transition flex items-center gap-2 font-medium">
      <i class="fas fa-sign-out-alt text-xs"></i> Cerrar sesión
    </button>
  </div>
</nav>

<main class="flex-1 pt-24 pb-16 px-6">
  <div class="max-w-5xl mx-auto">

    <!-- Header perfil -->
    <div class="flex flex-col md:flex-row items-start md:items-center gap-6 mb-10">
      <div class="w-20 h-20 rounded-3xl bg-brand/10 flex items-center justify-center shrink-0">
        <i class="fas fa-user text-brand text-3xl"></i>
      </div>
      <div class="flex-1">
        <p class="text-brand text-[11px] font-bold tracking-[0.3em] uppercase mb-1">Mi cuenta</p>
        <h1 id="perfilNombre" class="text-3xl font-extrabold text-dark">—</h1>
        <p id="perfilEmail" class="text-dark/45 text-sm mt-1"></p>
      </div>
      <button id="btnEditar" class="border border-gray-200 text-dark hover:border-brand hover:text-brand font-bold px-5 py-2.5 rounded-2xl transition text-sm flex items-center gap-2">
        <i class="fas fa-pencil-alt text-xs"></i> Editar perfil
      </button>
    </div>

    <!-- Tabs -->
    <div class="flex gap-2 mb-8 border-b border-gray-100 pb-1">
      <button class="tab-btn active border border-brand/0 text-sm font-bold px-5 py-2.5 rounded-xl transition" data-tab="tiquetes">Mis tiquetes</button>
      <button class="tab-btn border border-gray-200 text-dark/50 text-sm font-bold px-5 py-2.5 rounded-xl transition hover:border-brand hover:text-brand" data-tab="deseados">Eventos deseados</button>
      <button class="tab-btn border border-gray-200 text-dark/50 text-sm font-bold px-5 py-2.5 rounded-xl transition hover:border-brand hover:text-brand" data-tab="comentarios">Comentarios</button>
    </div>

    <!-- Tab: tiquetes -->
    <div id="tab-tiquetes">
      <div id="tiquetesLista" class="space-y-4"></div>
      <div id="tiquetesVacio" class="hidden text-center py-16">
        <i class="fas fa-ticket-alt text-4xl text-gray-200 mb-4 block"></i>
        <p class="text-dark/30 text-sm">No has comprado boletos aún.</p>
        <a href="eventos.html" class="inline-block mt-4 text-brand text-sm hover:underline">Explorar eventos</a>
      </div>
      <div class="mt-6 text-center">
        <a href="historialCompras.html" id="linkHistorial" class="hidden text-sm text-brand hover:underline font-medium">
          Ver historial completo <i class="fas fa-arrow-right text-xs ml-1"></i>
        </a>
      </div>
    </div>

    <!-- Tab: deseados -->
    <div id="tab-deseados" class="hidden">
      <div id="deseadosLista" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5"></div>
      <div id="deseadosVacio" class="hidden text-center py-16">
        <i class="fas fa-heart text-4xl text-gray-200 mb-4 block"></i>
        <p class="text-dark/30 text-sm">No tienes eventos deseados aún.</p>
      </div>
    </div>

    <!-- Tab: comentarios -->
    <div id="tab-comentarios" class="hidden">
      <div id="comentariosLista" class="space-y-4"></div>
      <div id="comentariosVacio" class="hidden text-center py-16">
        <i class="fas fa-comment-alt text-4xl text-gray-200 mb-4 block"></i>
        <p class="text-dark/30 text-sm">No has dejado valoraciones aún.</p>
      </div>
    </div>

  </div>
</main>

<!-- Modal editar perfil -->
<div id="modalEditar" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/40 px-4">
  <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md p-8">
    <div class="flex items-center justify-between mb-6">
      <h2 class="text-xl font-extrabold text-dark">Editar perfil</h2>
      <button id="cerrarModal" class="text-dark/30 hover:text-dark transition"><i class="fas fa-times"></i></button>
    </div>
    <div class="space-y-4">
      <div>
        <label class="text-xs font-bold text-dark/60 uppercase tracking-wider block mb-2">Nombre</label>
        <input id="editNombre" type="text" class="w-full border border-gray-200 rounded-2xl px-4 py-3 text-sm transition"/>
      </div>
      <div>
        <label class="text-xs font-bold text-dark/60 uppercase tracking-wider block mb-2">Correo</label>
        <input id="editEmail" type="email" class="w-full border border-gray-200 rounded-2xl px-4 py-3 text-sm transition"/>
      </div>
      <div>
        <label class="text-xs font-bold text-dark/60 uppercase tracking-wider block mb-2">Teléfono</label>
        <input id="editTelefono" type="text" class="w-full border border-gray-200 rounded-2xl px-4 py-3 text-sm transition"/>
      </div>
      <div>
        <label class="text-xs font-bold text-dark/60 uppercase tracking-wider block mb-2">Nueva contraseña <span class="text-dark/30 normal-case">(opcional)</span></label>
        <input id="editPassword" type="password" placeholder="••••••••" class="w-full border border-gray-200 rounded-2xl px-4 py-3 text-sm transition"/>
      </div>
      <button id="btnGuardar" class="w-full bg-brand hover:bg-blue-700 text-white font-bold py-3.5 rounded-2xl transition text-sm shadow-lg shadow-brand/20">
        Guardar cambios
      </button>
    </div>
  </div>
</div>

<footer class="bg-dark border-t border-white/5 py-8">
  <div class="max-w-7xl mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-4 text-white/40 text-sm">
    <span class="font-display font-bold text-white/70">Event<span class="text-brand">Hive</span></span>
    <span>© 2025 EventHive · Todos los derechos reservados</span>
    <div class="flex gap-5">
      <a href="#" class="hover:text-white transition"><i class="fab fa-instagram"></i></a>
      <a href="#" class="hover:text-white transition"><i class="fab fa-facebook"></i></a>
      <a href="#" class="hover:text-white transition"><i class="fab fa-tiktok"></i></a>
    </div>
  </div>
</footer>

<script src="/js/Perfil.js"></script>
</body></html>
