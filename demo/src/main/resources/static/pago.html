<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pasarela de Pago - EventHive</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <script>tailwind.config={theme:{extend:{fontFamily:{mont:['Montserrat','sans-serif'],sans:['Open Sans','sans-serif']},colors:{primary:'#007bff',accent:'#ffc107',dark:'#212529'}}}}</script>
</head>
<body class="font-sans bg-gradient-to-br from-[#667eea] to-[#764ba2] min-h-screen">

<!-- Header -->
<header class="bg-white shadow py-5">
  <div class="max-w-6xl mx-auto px-6">
    <h1 class="font-mont font-black text-2xl text-primary">EventHive</h1>
  </div>
</header>

<main class="max-w-5xl mx-auto px-6 py-12 grid md:grid-cols-[1fr_2fr] gap-8">

  <!-- Order summary -->
  <aside class="bg-white rounded-2xl shadow-xl p-7 h-fit md:sticky md:top-8">
    <h3 class="font-mont font-bold text-xl text-dark mb-5">Resumen del Pedido</h3>
    <ul class="space-y-3 text-sm text-gray-600 mb-5">
      <li class="flex justify-between"><span>Evento</span><span id="rEvento" class="font-semibold text-dark text-right max-w-[60%]">-</span></li>
      <li class="flex justify-between"><span>Localidad</span><span id="rLocalidad" class="font-semibold text-dark">-</span></li>
      <li class="flex justify-between"><span>Precio unitario</span><span id="rPrecio" class="font-semibold text-dark">-</span></li>
      <li class="flex justify-between"><span>Cantidad</span><span id="rCantidad" class="font-semibold text-dark">-</span></li>
    </ul>
    <div class="border-t pt-4">
      <div class="flex justify-between font-mont font-black text-lg text-dark">
        <span>Total</span><span id="rTotal">-</span>
      </div>
    </div>
    <div class="flex justify-around mt-6 text-gray-400 text-3xl">
      <i class="fab fa-cc-visa hover:text-dark transition"></i>
      <i class="fab fa-cc-mastercard hover:text-dark transition"></i>
      <i class="fab fa-cc-amex hover:text-dark transition"></i>
      <i class="fab fa-cc-discover hover:text-dark transition"></i>
    </div>
  </aside>

  <!-- Payment form -->
  <section class="bg-white rounded-2xl shadow-xl p-8">
    <h2 class="font-mont font-black text-2xl text-dark mb-1">Pago</h2>
    <p class="text-gray-500 text-sm mb-7">Completa los datos para procesar tu compra</p>

    <form id="paymentForm" class="space-y-5">
      <input type="hidden" id="localidadId"/>
      <input type="hidden" id="cantidad"/>

      <div id="cardFields" class="space-y-5">
        <div>
          <label class="block text-sm font-semibold text-dark mb-1">Nombre en la Tarjeta</label>
          <input id="cardName" type="text" placeholder="Nombre como en la tarjeta" required
            class="w-full px-4 py-3 border border-gray-300 rounded-xl text-sm focus:outline-none focus:border-primary focus:ring-2 focus:ring-blue-100 transition"/>
        </div>
        <div>
          <label class="block text-sm font-semibold text-dark mb-1">Número de Tarjeta</label>
          <input id="cardNum" type="text" placeholder="**** **** **** ****" maxlength="19" required
            class="w-full px-4 py-3 border border-gray-300 rounded-xl text-sm focus:outline-none focus:border-primary focus:ring-2 focus:ring-blue-100 transition font-mono tracking-widest"/>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-semibold text-dark mb-1">Vencimiento</label>
            <input id="expiry" type="text" placeholder="MM/AA" maxlength="5" required
              class="w-full px-4 py-3 border border-gray-300 rounded-xl text-sm focus:outline-none focus:border-primary focus:ring-2 focus:ring-blue-100 transition"/>
          </div>
          <div>
            <label class="block text-sm font-semibold text-dark mb-1">CVV</label>
            <input id="cvv" type="text" placeholder="123" maxlength="4" required
              class="w-full px-4 py-3 border border-gray-300 rounded-xl text-sm focus:outline-none focus:border-primary focus:ring-2 focus:ring-blue-100 transition"/>
          </div>
        </div>
      </div>

      <button type="submit" id="btnPagar"
        class="w-full bg-gradient-to-r from-[#667eea] to-[#764ba2] text-white font-bold text-lg py-4 rounded-xl hover:opacity-90 transition shadow-lg mt-2">
        Pagar Ahora
      </button>
    </form>
  </section>

</main>

<script type="module">
import { Compras } from '../shared/js/api.js';
import { session, formatMoney, setLoading } from '../shared/js/ui.js';

const p       = new URLSearchParams(location.search);
const evento   = p.get('evento');
const localidad= p.get('localidad');
const locId    = p.get('localidadId');
const precio   = parseFloat(p.get('precio'));
const cantidad = parseInt(p.get('cantidad'));

if (!evento||!locId||isNaN(precio)||!cantidad) {
  Swal.fire({icon:'error',title:'Datos incompletos',confirmButtonColor:'#007bff'}).then(()=>history.back());
} else {
  document.getElementById('rEvento').textContent    = evento;
  document.getElementById('rLocalidad').textContent  = localidad;
  document.getElementById('rPrecio').textContent     = precio===0 ? 'GRATIS' : formatMoney(precio);
  document.getElementById('rCantidad').textContent   = cantidad;
  document.getElementById('rTotal').textContent      = precio===0 ? 'GRATIS' : formatMoney(precio*cantidad);
  document.getElementById('localidadId').value = locId;
  document.getElementById('cantidad').value    = cantidad;

  // Free events: hide card fields
  if (precio===0) {
    document.getElementById('cardFields').classList.add('hidden');
    document.querySelectorAll('#cardFields [required]').forEach(el=>el.removeAttribute('required'));
    document.getElementById('btnPagar').textContent = 'Confirmar Reserva Gratuita';
  }

  // Card formatting
  document.getElementById('cardNum').addEventListener('input', e => {
    let v = e.target.value.replace(/\D|\s/g,'').slice(0,16);
    e.target.value = v.match(/.{1,4}/g)?.join(' ')||v;
  });
  document.getElementById('expiry').addEventListener('input', e => {
    let v = e.target.value.replace(/\D/g,'');
    if (v.length>=2) v = v.slice(0,2)+'/'+v.slice(2,4);
    e.target.value = v;
  });
  document.getElementById('cvv').addEventListener('input', e => {
    e.target.value = e.target.value.replace(/\D/g,'');
  });

  document.getElementById('paymentForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    if (precio!==0) {
      const num = document.getElementById('cardNum').value.replace(/\s/g,'');
      const exp = document.getElementById('expiry').value;
      const cvv = document.getElementById('cvv').value;
      if (num.length!==16)         return Swal.fire({icon:'error',title:'Número de tarjeta inválido (16 dígitos)'});
      if (!/^\d{2}\/\d{2}$/.test(exp)) return Swal.fire({icon:'error',title:'Fecha inválida (MM/AA)'});
      if (cvv.length<3)            return Swal.fire({icon:'error',title:'CVV inválido'});
    }
    const btn = document.getElementById('btnPagar');
    setLoading(btn, true);
    Swal.fire({title:'Procesando...', allowOutsideClick:false, didOpen:()=>Swal.showLoading()});
    try {
      const res = await Compras.procesar({
        localidadId: locId, cantidad, metodoPago: precio===0 ? 'Gratuito' : 'Tarjeta de Crédito'
      });
      Swal.close();
      if (res.success) {
        await Swal.fire({
          icon:'success', title: precio===0?'¡Reserva Exitosa!':'¡Pago Exitoso!',
          html:`<p>Tu ${precio===0?'reserva':'compra'} fue realizada</p><p><strong>Código: #${res.data?.compraId||''}</strong></p>`,
          confirmButtonText:'Ver mis boletos', confirmButtonColor:'#10ac84',
          showCancelButton:true, cancelButtonText:'Ir al inicio', cancelButtonColor:'#6c5ce7'
        }).then(r => {
          window.location.href = r.isConfirmed ? '/historialCompras.html' : '/index.html';
        });
      } else {
        Swal.fire({icon:'error', title:'Error', text: res.mensaje});
      }
    } catch { Swal.fire({icon:'error',title:'Error de conexión'}); }
    finally { setLoading(btn, false); }
  });
}
</script>
</body>
</html>
