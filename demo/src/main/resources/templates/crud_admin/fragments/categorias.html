<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
    <!-- Fragmento de la sección Categorías -->
    <section th:fragment="categorias-section" id="seccion-categorias" class="content-section">
        <div class="content-header">
            <h1>Gestión de Categorías</h1>
            <button class="btn-primary modal-trigger" data-modal="modal-categoria">
                <i class="fas fa-plus"></i> Crear Categoría
            </button>
        </div>
        <div class="table-container">
            <table id="tabla-categorias-dt" class="display">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre de Categoría</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="categoria : ${categorias}">
                        <td data-label="ID" th:text="${categoria.id}"></td>
                        <td data-label="Categoría" th:text="${categoria.nombre}"></td>
                        <td data-label="Acciones">
                            <button class="btn-secondary modal-trigger" data-modal="modal-categoria" data-action="edit">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button class="btn-danger btn-delete">
                                <i class="fas fa-trash"></i>
                            </button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </section>
</body>
</html>
