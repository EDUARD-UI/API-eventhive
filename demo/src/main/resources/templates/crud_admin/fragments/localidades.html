<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
    <!-- Fragmento de la sección Localidades -->
    <section th:fragment="localidades-section" id="seccion-localidades" class="content-section">
        <div class="content-header">
            <h1>Gestión de Localidades</h1>
            <button class="btn-primary modal-trigger" data-modal="modal-localidad">
                <i class="fas fa-plus"></i> Crear Localidad
            </button>
        </div>
        <div class="table-container">
            <table id="tabla-localidades-dt" class="display">
                <thead>
                    <tr>
                        <th>id</th>
                        <th>Nombre</th>
                        <th>Precio</th>
                        <th>Capacidad</th>
                        <th>Disponibles</th>
                        <th>Evento</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="localidad : ${localidades}">
                        <td data-label="Id" th:text="${localidad.id}"></td>
                        <td data-label="Nombre" th:text="${localidad.nombre}"></td>
                        <td data-label="Precio" th:text="${localidad.precio != null ? '$' + localidad.precio : 'N/A'}"></td>
                        <td data-label="Capacidad" th:text="${localidad.capacidad}"></td>
                        <td data-label="Disponibles" th:text="${localidad.disponibles}"></td>
                        <td data-label="Evento" th:text="${localidad.evento != null ? localidad.evento.titulo : 'Sin evento'}"></td>
                        <td data-label="Acciones">
                            <button class="btn-secondary modal-trigger" data-modal="modal-localidad" data-action="edit">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button class="btn-danger btn-delete">
                                <i class="fas fa-trash"></i>
                            </button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </section>
</body>
</html>
