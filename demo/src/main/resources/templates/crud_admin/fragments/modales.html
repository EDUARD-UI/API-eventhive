<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<body>
    <!-- Fragmento con todos los modales -->
    <div th:fragment="modales">

        <!-- Modal Evento -->
        <div id="modal-evento" class="modal">
            <div class="modal-content">
                <span class="close-button">&times;</span>
                <h2 class="modal-title">Crear Evento</h2>
                <form class="modal-form" enctype="multipart/form-data">
                    <input type="hidden" id="evento-id" name="id">
                    <div class="input-group">
                        <label for="evento-titulo">Título</label>
                        <input type="text" id="evento-titulo" name="titulo" required>
                    </div>
                    <div class="input-group">
                        <label for="evento-descripcion">Descripción</label>
                        <textarea id="evento-descripcion" name="descripcion" rows="3" required></textarea>
                    </div>
                    <div class="form-row">
                        <div class="input-group">
                            <label for="evento-fecha">Fecha</label>
                            <input type="date" id="evento-fecha" name="fecha" required>
                        </div>
                        <div class="input-group">
                            <label for="evento-hora">Hora</label>
                            <input type="time" id="evento-hora" name="hora" required>
                        </div>
                    </div>
                    <div class="input-group">
                        <label for="evento-lugar">Lugar</label>
                        <input type="text" id="evento-lugar" name="lugar" required>
                    </div>
                    <div class="input-group">
                        <label for="evento-categoria">Categoría</label>
                        <select id="evento-categoria" name="categoriaId" required>
                            <option value="">Seleccione una categoría</option>
                            <option th:each="categoria : ${categorias}" th:value="${categoria.id}"
                                th:text="${categoria.nombre}">
                            </option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label for="evento-estado">Estado</label>
                        <select id="evento-estado" name="estadoId" required>
                            <option value="">Seleccione un estado</option>
                            <option th:each="estado : ${estados}" th:value="${estado.id}" th:text="${estado.nombre}">
                            </option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label for="evento-foto">Foto del Evento</label>
                        <input type="file" id="evento-foto" name="foto" accept="image/*">
                        <small style="color: #666; font-size: 0.9em; display: block; margin-top: 5px;">
                            Formatos permitidos: JPG, PNG, GIF. Máximo 5MB
                        </small>
                    </div>

                    <button type="submit" class="btn-primary">Guardar Evento</button>
                </form>
            </div>
        </div>

        <!-- Modal Usuario -->
        <div id="modal-usuario" class="modal">
            <div class="modal-content">
                <span class="close-button">&times;</span>
                <h2 id="modal-usuario-titulo">Crear Usuario</h2>
                <form id="form-usuario" class="modal-form">
                    <input type="hidden" id="usuario-id" name="id">
                    <div class="form-row">
                        <div class="input-group">
                            <label for="usuario-nombre">Nombre</label>
                            <input type="text" id="usuario-nombre" name="nombre" required>
                        </div>
                        <div class="input-group">
                            <label for="usuario-apellido">Apellido</label>
                            <input type="text" id="usuario-apellido" name="apellido" required>
                        </div>
                    </div>
                    <div class="input-group">
                        <label for="usuario-correo">Correo</label>
                        <input type="email" id="usuario-correo" name="correo" required>
                    </div>
                    <div class="input-group">
                        <label for="usuario-telefono">Teléfono</label>
                        <input type="tel" id="usuario-telefono" name="telefono" required>
                    </div>
                    <div class="input-group">
                        <label for="usuario-clave">Contraseña</label>
                        <input type="password" id="usuario-clave" name="clave" required>
                    </div>
                    <div class="input-group">
                        <label for="usuario-rol">Rol</label>
                        <select id="usuario-rol" name="rolId" required>
                            <option th:each="rol : ${roles}" th:value="${rol.id}" th:text="${rol.nombre}">
                            </option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label for="usuario-estado">Estado</label>
                        <select id="usuario-estado" name="estadoId" required>
                            <option th:each="estado : ${estados}" th:value="${estado.id}" th:text="${estado.nombre}">
                            </option>
                        </select>
                    </div>
                    <button type="submit" class="btn-primary">Guardar Usuario</button>
                </form>
            </div>
        </div>

        <!-- Modal Localidad -->
        <div id="modal-localidad" class="modal">
            <div class="modal-content">
                <span class="close-button">&times;</span>
                <h2 id="modal-localidad-titulo">Crear Localidad</h2>
                <form class="modal-form">
                    <input type="hidden" id="localidad-id" name="id">
                    <div class="input-group">
                        <label for="localidad-nombre">Nombre</label>
                        <input type="text" id="localidad-nombre" name="nombre" required>
                    </div>
                    <div class="input-group">
                        <label for="localidad-precio">Precio</label>
                        <input type="number" id="localidad-precio" name="precio" step="0.01" required>
                    </div>
                    <div class="input-group">
                        <label for="localidad-capacidad">Capacidad</label>
                        <input type="number" id="localidad-capacidad" name="capacidad" required>
                    </div>
                    <div class="input-group">
                        <label for="localidad-disponibles">Disponibles</label>
                        <input type="number" id="localidad-disponibles" name="disponibles" required>
                    </div>
                    <div class="input-group">
                        <label for="localidad-evento">Evento</label>
                        <select id="localidad-evento" name="eventoId" required>
                            <option value="">Seleccione un evento</option>
                            <option th:each="evento : ${eventos}" th:value="${evento.id}" th:text="${evento.titulo}">
                            </option>
                        </select>
                    </div>
                    <button type="submit" class="btn-primary">Guardar Localidad</button>
                </form>
            </div>
        </div>

        <!-- Modal Promoción -->
        <div id="modal-promocion" class="modal">
            <div class="modal-content">
                <span class="close-button">&times;</span>
                <h2 id="modal-promocion-titulo">Crear Promoción</h2>
                <form class="modal-form">
                    <input type="hidden" id="promocion-id" name="id">
                    <div class="input-group">
                        <label for="promocion-evento">Evento</label>
                        <select id="promocion-evento" name="eventoId" required>
                            <option th:each="evento : ${eventos}" th:value="${evento.id}" th:text="${evento.titulo}">
                            </option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label for="promocion-descripcion">Descripción</label>
                        <textarea id="promocion-descripcion" name="descripcion" rows="2" required></textarea>
                    </div>
                    <div class="input-group">
                        <label for="promocion-descuento">Descuento (%)</label>
                        <input type="number" id="promocion-descuento" name="descuento" min="1" max="100" required>
                    </div>
                    <div class="form-row">
                        <div class="input-group">
                            <label for="promocion-inicio">Fecha de Inicio</label>
                            <input type="date" id="promocion-inicio" name="fechaInicio" required>
                        </div>
                        <div class="input-group">
                            <label for="promocion-fin">Fecha de Fin</label>
                            <input type="date" id="promocion-fin" name="fechaFin" required>
                        </div>
                    </div>
                    <button type="submit" class="btn-primary">Guardar Promoción</button>
                </form>
            </div>
        </div>

        <!-- Modal Rol -->
        <div id="modal-rol" class="modal">
            <div class="modal-content">
                <span class="close-button">&times;</span>
                <h2 id="modal-rol-titulo">Crear Rol</h2>
                <form class="modal-form">
                    <input type="hidden" id="rol-id" name="id">
                    <div class="input-group">
                        <label for="rol-nombre">Nombre del Rol</label>
                        <input type="text" id="rol-nombre" name="nombre" required>
                    </div>
                    <div class="input-group">
                        <label for="rol-descripcion">Descripción</label>
                        <textarea id="rol-descripcion" name="descripcion" rows="2"></textarea>
                    </div>
                    <div class="input-group">
                        <label for="rol-estado">Estado</label>
                        <select id="rol-estado" name="estadoId" required>
                            <option th:each="estado : ${estados}" th:value="${estado.id}" th:text="${estado.nombre}">
                            </option>
                        </select>
                    </div>
                    <button type="submit" class="btn-primary">Guardar Rol</button>
                </form>
            </div>
        </div>

        <!-- Modal Categoría -->
        <div id="modal-categoria" class="modal">
            <div class="modal-content">
                <span class="close-button">&times;</span>
                <h2 class="modal-title">Crear Categoría</h2>
                <form class="modal-form" enctype="multipart/form-data">
                    <input type="hidden" id="categoria-id" name="id">
                    <div class="input-group">
                        <label for="categoria-nombre">Nombre de Categoría</label>
                        <input type="text" id="categoria-nombre" name="nombre" required>
                    </div>
                    <div class="input-group">
                        <label for="categoria-foto">Foto de Categoría</label>
                        <input type="file" id="categoria-foto" name="foto" accept="image/*">
                        <small style="color: #666; font-size: 0.9em; display: block; margin-top: 5px;">
                            Formatos permitidos: JPG, PNG, GIF. Máximo 5MB
                        </small>
                    </div>

                    <button type="submit" class="btn-primary">Guardar Categoría</button>
                </form>
            </div>
        </div>

        <!-- Modal Estado -->
        <div id="modal-estado" class="modal">
            <div class="modal-content">
                <span class="close-button">&times;</span>
                <h2 id="modal-estado-titulo">Crear Estado</h2>
                <form class="modal-form">
                    <input type="hidden" id="estado-id" name="id">
                    <div class="input-group">
                        <label for="estado-nombre">Nombre del Estado</label>
                        <input type="text" id="estado-nombre" name="nombre" required>
                    </div>
                    <div class="input-group">
                        <label for="estado-descripcion">Descripción</label>
                        <textarea id="estado-descripcion" name="descripcion" rows="2"></textarea>
                    </div>
                    <button type="submit" class="btn-primary">Guardar Estado</button>
                </form>
            </div>
        </div>

    </div>
</body>

</html>
