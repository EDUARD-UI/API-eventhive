<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
    <!-- Fragmento de la sección Perfil -->
    <section th:fragment="perfil-section" id="seccion-perfil" class="content-section">
        <div class="content-header">
            <h1>Mi Perfil</h1>
        </div>

        <div class="perfil-container">
            <h2 class="perfil-title">Editar Información</h2>

            <form class="perfil-form" id="form-perfil">
                <input type="hidden" id="perfil-id" th:value="${usuarioActual != null ? usuarioActual.id : ''}">
                
                <div class="input-group-profile">
                    <label for="perfil-nombre">Nombre</label>
                    <input type="text" id="perfil-nombre" th:value="${usuarioActual != null ? usuarioActual.nombre : ''}" placeholder="Tu nombre" required>
                </div>

                <div class="input-group-profile">
                    <label for="perfil-apellido">Apellido</label>
                    <input type="text" id="perfil-apellido" th:value="${usuarioActual != null ? usuarioActual.apellido : ''}" placeholder="Tu apellido" required>
                </div>

                <div class="input-group-profile">
                    <label for="perfil-correo">Correo</label>
                    <input type="email" id="perfil-correo" th:value="${usuarioActual != null ? usuarioActual.correo : ''}" placeholder="ejemplo@correo.com" required>
                </div>

                <div class="input-group-profile">
                    <label for="perfil-telefono">Teléfono</label>
                    <input type="tel" id="perfil-telefono" th:value="${usuarioActual != null ? usuarioActual.telefono : ''}" placeholder="3001234567" required>
                </div>

                <div class="input-group-profile">
                    <label for="perfil-clave">Nueva Contraseña (opcional)</label>
                    <input type="password" id="perfil-clave" placeholder="Dejar en blanco para mantener la actual">
                </div>

                <button type="submit" class="btn-save-profile">Guardar Cambios</button>
            </form>

            <button class="btn-danger btn-delete-account" id="btn-eliminar-cuenta">
                <i class="fas fa-exclamation-triangle"></i> Eliminar Cuenta
            </button>
        </div>
    </section>
</body>
</html>
