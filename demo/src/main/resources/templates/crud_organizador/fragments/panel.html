<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
    <!-- Fragmento del Panel Principal -->
    <section th:fragment="panel-section" id="seccion-panel" class="content-section active">
        <h1>Panel del Organizador</h1>

        <!-- Estadísticas -->
        <div class="stats-grid">
            <div class="stat-card">
                <h2 th:text="${totalEventos}">0</h2>
                <p>Eventos creados</p>
            </div>
            <div class="stat-card">
                <h2 th:text="${totalNotificaciones}">0</h2>
                <p>Valoraciones recibidas</p>
            </div>
        </div>

        <!-- Accesos rápidos -->
        <h2>Accesos rápidos</h2>
        <div class="quick-actions">
            <button class="quick-btn primary" id="btnCrearEvento">
                <i class="fa-solid fa-plus"></i> Crear evento
            </button>

            <a href="#seccion-eventos" class="quick-btn" id="btnVerEventos">
                <i class="fa-solid fa-clipboard-list"></i> Ver eventos
            </a>

            <a href="#seccion-reportes" class="quick-btn" id="btnReportes">
                <i class="fa-solid fa-chart-column"></i> Reportes
            </a>
        </div>
    </section>
</body>
</html>
