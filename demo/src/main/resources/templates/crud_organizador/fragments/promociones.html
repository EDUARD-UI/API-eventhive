<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
    <!-- Fragmento de la sección Promociones -->
    <section th:fragment="promociones-section" id="seccion-promociones" class="content-section">
        <div class="content-header">
            <h1>Gestión de Promociones</h1>
            <button class="btn-primary modal-trigger" data-modal="modal-promocion">
                <i class="fas fa-plus"></i> Crear Promoción
            </button>
        </div>
        <div class="table-container">
            <table id="tabla-promociones-dt" class="display">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Evento Asociado</th>
                        <th>Descuento</th>
                        <th>Descripción</th>
                        <th>Fecha Inicio</th>
                        <th>Fecha Fin</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="promocion : ${promociones}">
                        <td data-label="ID" th:text="${promocion.id}"></td>
                        <td data-label="Evento" th:text="${promocion.evento != null ? promocion.evento.titulo : 'Sin evento'}"></td>
                        <td data-label="Descuento" th:text="${promocion.descuento + '%'}"></td>
                        <td data-label="Descripción" th:text="${promocion.descripcion}"></td>
                        <td data-label="Fecha Inicio" th:text="${promocion.fechaInicio}"></td>
                        <td data-label="Fecha Fin" th:text="${promocion.fechaFinal}"></td>
                        <td data-label="Acciones">
                            <button class="btn-secondary modal-trigger" data-modal="modal-promocion" data-action="edit">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button class="btn-danger btn-delete">
                                <i class="fas fa-trash"></i>
                            </button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </section>
</body>
</html>
