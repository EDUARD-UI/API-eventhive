<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
    <!-- Fragmento de la sección Reportes -->
    <section th:fragment="reportes-section" id="seccion-reportes" class="content-section">
        <div class="content-header">
            <h1>Reportes</h1>
        </div>

        <div class="reportes-container">
            <!-- Reporte de Eventos por Categoría -->
            <div class="card reporte-card">
                <h3>Eventos por categoría</h3>
                <canvas id="chartReporteCategorias"></canvas>
            </div>

            <!-- Reporte de Valoraciones por Evento -->
            <div class="card reporte-card">
                <h3>Valoraciones por evento</h3>
                <canvas id="chartReporteValoraciones"></canvas>
            </div>
        </div>
    </section>

    <!-- Incluir el script de reportes -->
    <script th:src="@{/js/reportes_graficos.js}"></script>
</body>
</html>
