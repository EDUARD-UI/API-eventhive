<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página no encontrada - Eventos App</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/404.css}">
</head>

<body>
    <div class="container">
        <div class="logo">
            <i class="fas fa-calendar-alt"></i>
            <span>EventHive</span>
        </div>

        <div class="error-content">
            <div class="error-icon">
                <i class="fas fa-exclamation-triangle"></i>
            </div>

            <h1>¡Ups!</h1>
            <h2>Algo salió mal</h2>

            <p>Lo sentimos, ha ocurrido un error inesperado.</p>
            <p>Parece que hay un problema técnico. Nuestro equipo ya está trabajando para solucionarlo.</p>

            <div class="buttons">
                <button id="goBack" class="btn btn-primary">
                    <i class="fas fa-arrow-left"></i> Volver atrás
                </button>
                <a href="/" class="btn btn-secondary">
                    <i class="fas fa-home"></i> Ir al inicio
                </a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('goBack').addEventListener('click', function () {
            window.history.back();
        });
    </script>
</body>

</html>
