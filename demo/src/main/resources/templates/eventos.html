<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todas las Categorías y Eventos | EventHive</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/CategoriaEventos.css}">
    <link rel="stylesheet" th:href="@{/css/barraLateral.css}">
    <link rel="stylesheet" th:href="@{/css/eventos.css}">
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Open+Sans:wght@400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>

<body>
    <header class="main-header">
        <div th:replace="~{fragments/navbar :: navbar}"></div>
    </header>

    <main class="container mt-4">
        <h2 class="section-title" style="text-align: center;">Todas las Categorías y Eventos</h2>
        <div class="categories-layout">
            <aside class="filter-sidebar">
                <div class="filter-header">
                    <h3 class="filter-title">Categorías</h3>
                </div>

                <ul class="category-list">
                    <li class="category-item" th:each="categoria : ${categorias}">
                        <a th:href="@{/categorias/{id}(id=${categoria.id})}" class="category-link">
                            <i class="fas fa-folder"></i>
                            <span th:text="${categoria.nombre}">Nombre Categoría</span>
                        </a>
                    </li>
                </ul>
            </aside>

            <div class="main-content">
                <div th:each="categoria : ${categoriasConEventos}" class="category-section">
                    <div class="category-header">
                        <a th:href="@{/categorias/{id}(id=${categoria.id})}" class="category-title-link">
                            <h3 th:text="${categoria.nombre}" class="category-title"></h3>
                        </a>
                        <span class="event-count" th:if="${categoria.totalEventos > 0}">
                            (<span th:text="${categoria.totalEventos}"></span> eventos)
                        </span>
                    </div>

                    <div th:if="${categoria.eventos.empty}" class="no-events">
                        <p>No hay eventos en esta categoría</p>
                    </div>

                    <div th:unless="${categoria.eventos.empty}" class="events-container">
                        <div class="event-grid">
                            <div th:each="evento : ${categoria.eventos}" class="event-card">
                                <div class="event-image">
                                    <div th:if="${evento.foto != null and !#strings.isEmpty(evento.foto)}" 
                                         class="event-image-container">
                                        <img th:src="@{/uploads/eventos/{foto}(foto=${evento.foto})}" 
                                             th:alt="${evento.titulo}" 
                                             class="event-img">
                                    </div>
                                    <div th:unless="${evento.foto != null and !#strings.isEmpty(evento.foto)}" 
                                         class="event-img-placeholder">
                                        <i class="fas fa-image fa-2x"></i>
                                    </div>
                                </div>

                                <div class="event-info">
                                    <h4 th:text="${evento.titulo}" class="event-title"></h4>
                                    <p th:text="${evento.descripcion}" class="event-description"></p>
                                    <p class="event-meta">
                                        <i class="fas fa-map-marker-alt"></i>
                                        <span th:text="${evento.lugar}"></span>
                                    </p>
                                    <p class="event-meta">
                                        <i class="fas fa-calendar"></i>
                                        <span th:text="${#temporals.format(evento.fecha, 'dd/MM/yyyy')}"></span>
                                    </p>
                                    <a th:href="@{/eventos/{id}(id=${evento.id})}" class="btn-info">Ver detalles</a>
                                </div>
                            </div>
                        </div>
                        
                        <!-- Botón Ver Más -->
                        <div th:if="${categoria.totalEventos > 10}" class="view-more-container">
                            <a th:href="@{/categorias/{id}(id=${categoria.id})}" class="btn-view-more">
                                Ver todos los <span th:text="${categoria.totalEventos}"></span> eventos
                                <i class="fas fa-arrow-right"></i>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="main-footer">
        <div th:replace="~{fragments/footer :: footer}"></div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const currentPath = window.location.pathname;
            const categoryLinks = document.querySelectorAll('.category-link');

            categoryLinks.forEach(link => {
                const href = link.getAttribute('href');
                if (href && currentPath.includes(href)) {
                    link.style.color = 'var(--primary-color)';
                    link.style.fontWeight = '600';
                }
            });
        });
    </script>
</body>
</html>
